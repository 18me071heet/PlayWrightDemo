name: Playwright Tests

on:
  push:
    branches: [ main, stage ]
  pull_request:
  schedule:
    - cron: '0 0 * * *'   # daily run at 5:30 AM IST

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Matrix to run multiple browsers in parallel
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      # 1️⃣ Checkout repo
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Show Playwright config (optional, for debugging)
      - name: 🔍 Show Playwright Config
        run: npx playwright show-config

      # 6️⃣ Run tests for the current browser in matrix
      - name: 🧪 Run Tests on ${{ matrix.browser }}
        run: |
          echo "Running tests on ${{ matrix.browser }}"
          npx playwright test --project=${{ matrix.browser }} --reporter=html

      # 7️⃣ Upload reports for each browser
      - name: 📊 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/