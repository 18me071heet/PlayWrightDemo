name: Playwright CI/CD Pipeline

on:
  push:
    branches: [ main, stage ]
  pull_request:
  schedule:
    - cron: '0 0 * * *'   # daily run at 5:30 AM IST

jobs:
  # 1️⃣ Test Job: Runs multi-browser tests in parallel
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        browser: [chromium, firefox]

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🧪 Run Tests on ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }} --reporter=html

      - name: 📊 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/

  # 2️⃣ Deploy Job: Runs only once after all test jobs succeed
  deploy-staging:
    runs-on: ubuntu-latest
    needs: test                  # wait for all matrix test jobs
    if: ${{ success() }}         # run only if all tests pass
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging
        run: |
          echo "Deploying app to staging environment..."
          ./scripts/deploy-to-staging.sh